<svg width="680" height="490" viewBox="0 0 680 490" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>.sans{font-family:Arial,Helvetica,sans-serif;}.serif{font-family:Georgia,'Times New Roman',serif;}</style>
  </defs>

  <rect width="680" height="490" rx="20" fill="#eef0f2"/>

  <!-- Eyebrow -->
  <circle cx="44" cy="48" r="4" fill="#2563eb"/>
  <text x="56" y="53" class="sans" font-size="11" font-weight="500" fill="#2563eb" letter-spacing="1.5">OPENTECHNOLOGYAPP — ACCESS CONTROL</text>

  <!-- Headline -->
  <text x="44" y="96" class="serif" font-size="36" font-weight="700" fill="#111827">Role-based access,</text>
  <text x="44" y="138" class="serif" font-size="36" font-weight="700" fill="#111827"><tspan font-style="italic" fill="#2563eb">server-side enforced.</tspan></text>
  <text x="44" y="167" class="sans" font-size="14" fill="#6b7280">Every role check happens on the server. A demoted user's session is rejected immediately.</text>

  <!-- Role cards -->


<svg width="680" height="530" viewBox="0 0 680 530" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>.sans{font-family:Arial,Helvetica,sans-serif;}.serif{font-family:Georgia,'Times New Roman',serif;}</style>
  </defs>

  <rect width="680" height="530" rx="20" fill="#eef0f2"/>

  <!-- Eyebrow -->
  <circle cx="44" cy="48" r="4" fill="#2563eb"/>
  <text x="56" y="53" class="sans" font-size="11" font-weight="500" fill="#2563eb" letter-spacing="1.5">OPENTECHNOLOGYAPP — FEATURES</text>

  <!-- Headline -->
  <text x="44" y="96" class="serif" font-size="36" font-weight="700" fill="#111827">Your team's work,</text>
  <text x="44" y="138" class="serif" font-size="36" font-weight="700" fill="#111827"><tspan font-style="italic" fill="#2563eb">organized your way.</tspan></text>
  <text x="44" y="167" class="sans" font-size="14" fill="#6b7280">Projects, queues, boards, dashboards, automations, time tracking — all in one deployment.</text>

  <!-- 6 feature cards, 2 rows of 3 -->
  <!-- Row 1 -->

  <!-- Card 1: Organize -->
  <rect x="44" y="186" width="186" height="148" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="60" y="202" width="36" height="36" rx="9" fill="#eff6ff"/>
  <!-- grid icon -->
  <rect x="67" y="209" width="10" height="10" rx="2" fill="#2563eb"/>
  <rect x="80" y="209" width="10" height="10" rx="2" fill="#2563eb"/>
  <rect x="67" y="222" width="10" height="10" rx="2" fill="#2563eb"/>
  <rect x="80" y="222" width="10" height="10" rx="2" fill="#2563eb"/>
  <text x="60" y="257" class="sans" font-size="13" font-weight="500" fill="#111827">Organize</text>
  <text x="60" y="273" class="sans" font-size="11" fill="#6b7280">Projects, queues, and</text>
  <text x="60" y="288" class="sans" font-size="11" fill="#6b7280">custom fields for every</text>
  <text x="60" y="303" class="sans" font-size="11" fill="#6b7280">item your team tracks.</text>
  <rect x="60" y="316" width="80" height="6" rx="3" fill="#eff6ff"/>

  <!-- Card 2: View -->
  <rect x="247" y="186" width="186" height="148" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="263" y="202" width="36" height="36" rx="9" fill="#eff6ff"/>
  <!-- kanban icon -->
  <rect x="270" y="209" width="7" height="22" rx="2" fill="#2563eb"/>
  <rect x="280" y="209" width="7" height="16" rx="2" fill="#93c5fd"/>
  <rect x="290" y="209" width="7" height="19" rx="2" fill="#2563eb"/>
  <text x="263" y="257" class="sans" font-size="13" font-weight="500" fill="#111827">See your work</text>
  <text x="263" y="273" class="sans" font-size="11" fill="#6b7280">Table view or Kanban</text>
  <text x="263" y="288" class="sans" font-size="11" fill="#6b7280">board. Drag cards to</text>
  <text x="263" y="303" class="sans" font-size="11" fill="#6b7280">update status instantly.</text>
  <rect x="263" y="316" width="80" height="6" rx="3" fill="#eff6ff"/>

  <!-- Card 3: Dashboards -->
  <rect x="450" y="186" width="186" height="148" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="466" y="202" width="36" height="36" rx="9" fill="#eff6ff"/>
  <!-- chart icon -->
  <rect x="473" y="220" width="6" height="14" rx="2" fill="#93c5fd"/>
  <rect x="482" y="214" width="6" height="20" rx="2" fill="#2563eb"/>
  <rect x="491" y="217" width="6" height="17" rx="2" fill="#93c5fd"/>
  <text x="466" y="257" class="sans" font-size="13" font-weight="500" fill="#111827">Dashboards</text>
  <text x="466" y="273" class="sans" font-size="11" fill="#6b7280">Stat cards, bar charts,</text>
  <text x="466" y="288" class="sans" font-size="11" fill="#6b7280">progress bars. Track</text>
  <text x="466" y="303" class="sans" font-size="11" fill="#6b7280">what matters, always.</text>
  <rect x="466" y="316" width="80" height="6" rx="3" fill="#eff6ff"/>

  <!-- Row 2 -->

  <!-- Card 4: Automations -->
  <rect x="44" y="350" width="186" height="148" rx="12" fill="#2563eb"/>
  <rect x="60" y="366" width="36" height="36" rx="9" fill="rgba(255,255,255,0.15)"/>
  <!-- lightning bolt -->
  <polygon points="76,370 70,386 76,386 70,402 82,384 76,384" fill="#ffffff"/>
  <text x="60" y="421" class="sans" font-size="13" font-weight="500" fill="#ffffff">Automations</text>
  <text x="60" y="437" class="sans" font-size="11" fill="#93c5fd">Triggers, field changes,</text>
  <text x="60" y="452" class="sans" font-size="11" fill="#93c5fd">webhooks to Slack,</text>
  <text x="60" y="467" class="sans" font-size="11" fill="#93c5fd">Zapier, any endpoint.</text>
  <rect x="60" y="480" width="80" height="6" rx="3" fill="rgba(255,255,255,0.2)"/>

  <!-- Card 5: Time Tracking -->
  <rect x="247" y="350" width="186" height="148" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="263" y="366" width="36" height="36" rx="9" fill="#eff6ff"/>
  <!-- clock icon -->
  <circle cx="281" cy="384" r="11" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="281" y1="378" x2="281" y2="384" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <line x1="281" y1="384" x2="286" y2="387" stroke="#2563eb" stroke-width="2" stroke-linecap="round"/>
  <text x="263" y="421" class="sans" font-size="13" font-weight="500" fill="#111827">Time tracking</text>
  <text x="263" y="437" class="sans" font-size="11" fill="#6b7280">Log time per item.</text>
  <text x="263" y="452" class="sans" font-size="11" fill="#6b7280">See actual vs estimate</text>
  <text x="263" y="467" class="sans" font-size="11" fill="#6b7280">with no extra tools.</text>
  <rect x="263" y="480" width="80" height="6" rx="3" fill="#eff6ff"/>

  <!-- Card 6: Public Portal -->
  <rect x="450" y="350" width="186" height="148" rx="12" fill="#ffffff" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="466" y="366" width="36" height="36" rx="9" fill="#eff6ff"/>
  <!-- globe / portal icon -->
  <circle cx="484" cy="384" r="11" fill="none" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="484" y1="373" x2="484" y2="395" stroke="#2563eb" stroke-width="1.5"/>
  <line x1="473" y1="384" x2="495" y2="384" stroke="#2563eb" stroke-width="1.5"/>
  <path d="M473 378 Q484 375 495 378" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <path d="M473 390 Q484 393 495 390" fill="none" stroke="#2563eb" stroke-width="1.5"/>
  <text x="466" y="421" class="sans" font-size="13" font-weight="500" fill="#111827">Public portal</text>
  <text x="466" y="437" class="sans" font-size="11" fill="#6b7280">Embeddable intake</text>
  <text x="466" y="452" class="sans" font-size="11" fill="#6b7280">forms. No account</text>
  <text x="466" y="467" class="sans" font-size="11" fill="#6b7280">needed to submit.</text>
  <rect x="466" y="480" width="80" height="6" rx="3" fill="#eff6ff"/>
</svg>
